<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Translator Pro | Intelligent Systems</title>
    <style>
      :root {
        --bg: #05070a;
        --glass: rgba(17, 24, 39, 0.8);
        --primary: #10a37f; /* Vert ChatGPT */
        --accent: #3b82f6; /* Bleu technique */
        --text-main: #ececf1;
        --text-dim: #94a3b8;
        --glow: rgba(16, 163, 127, 0.2);
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: radial-gradient(circle at 50% 0%, #1a1c2e 0%, #05070a 100%);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
      }

      .container {
        width: 90%;
        max-width: 650px;
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        position: relative;
      }

      /* Animation subtile de l'en-tête */
      header {
        text-align: center;
        margin-bottom: 35px;
      }

      h2 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .badge {
        font-size: 0.65rem;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.1em;
        background: rgba(16, 163, 127, 0.15);
        color: var(--primary);
        padding: 5px 14px;
        border-radius: 30px;
        border: 1px solid rgba(16, 163, 127, 0.2);
      }

      /* Zone de saisie stylisée */
      .input-wrapper {
        position: relative;
        margin-bottom: 20px;
      }

      textarea {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 20px;
        padding-right: 50px; /* Espace pour le micro */
        color: white;
        font-size: 1.05rem;
        resize: none;
        box-sizing: border-box;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      textarea:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 20px var(--glow);
      }

      /* Animation du bouton micro */
      #micBtn {
        position: absolute;
        right: 15px;
        bottom: 15px;
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        transition: 0.3s;
        opacity: 0.6;
      }

      #micBtn:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      .mic-active {
        color: #ef4444;
        animation: pulseMic 1.5s infinite;
        opacity: 1 !important;
      }

      @keyframes pulseMic {
        0% {
          transform: scale(1);
          filter: drop-shadow(0 0 0px red);
        }
        50% {
          transform: scale(1.2);
          filter: drop-shadow(0 0 10px red);
        }
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 0px red);
        }
      }

      .controls {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }

      select {
        flex: 1;
        background: #1a1c2e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 14px;
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: 0.3s;
      }

      .translate-btn {
        flex: 1.5;
        background: var(--primary);
        border: none;
        border-radius: 14px;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .translate-btn:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(16, 163, 127, 0.3);
      }

      /* Animation Loader */
      .loader {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #output {
        margin-top: 30px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 20px;
        padding: 25px;
        min-height: 80px;
        line-height: 1.7;
        color: #f1f5f9;
        border: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 1.05rem;
        position: relative;
        transition: 0.3s;
      }

      .action-btns {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: -15px; /* Superposition légère sur l'output */
        padding-right: 15px;
      }

      .icon-btn {
        background: #2d2d3d;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px 16px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      }

      .icon-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        transform: translateY(-2px);
      }

      .history-panel {
        margin-top: 40px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 25px;
      }

      .history-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-dim);
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .history-item {
        background: rgba(255, 255, 255, 0.02);
        padding: 15px;
        border-radius: 14px;
        margin-bottom: 12px;
        font-size: 0.85rem;
        border-left: 4px solid var(--primary);
        transition: 0.3s;
      }

      .history-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .stats-footer {
        margin-top: 15px;
        font-size: 0.75rem;
        color: var(--text-dim);
        display: flex;
        justify-content: space-between;
        padding: 0 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h2>Smart Translator AI</h2>
      </header>

      <div class="input-wrapper">
        <textarea
          id="text"
          rows="4"
          placeholder="Enter text to process..."
        ></textarea>
        <button id="micBtn" onclick="startVoice()" title="Voice Input">
          🎤
        </button>
      </div>

      <div class="status-bar">
        <span class="badge">Neural Engine Active</span>
        <span
          id="timer"
          style="font-size: 0.7rem; color: var(--text-dim)"
        ></span>
      </div>

      <div class="controls">
        <select id="lang">
          <option value="French">French 🇫🇷</option>
          <option value="Arabic">Arabic 🇲🇦</option>
          <option value="Spanish">Spanish 🇪🇸</option>
          <option value="English">English 🇬🇧</option>
        </select>

        <button
          id="translateBtn"
          class="translate-btn"
          onclick="translateText()"
        >
          <span class="loader" id="loader" style="display: none"></span>
          <span id="btnText">Process Translation</span>
        </button>
      </div>

      <div id="output">Output will appear here...</div>

      <div class="action-btns">
        <button class="icon-btn" onclick="copyText()" title="Copy to clipboard">
          📋
        </button>
        <button
          class="icon-btn"
          onclick="speakText()"
          title="Listen to translation"
        >
          🔊
        </button>
      </div>

      <div class="stats-footer">
        <span id="sourceInfo">Status: Ready</span>
      </div>

      <div class="history-panel">
        <div class="history-title">🕒 Recent Activity</div>
        <div id="history-list"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
